version: '3.2'
name: eubucco

volumes:
  postgres_data: { }
  postgres_data_backups: { }
  minio_data: {}

services:
  django:
    image: eubucco/eubucco.com:production
    container_name: eubucco_django
    depends_on:
      - postgres
      - redis
      - minio
    command: /start
    restart: unless-stopped
    volumes:
      - /home/eubucco-data:/app/data
    networks:
      default:
        aliases:
          - django-webhook
      proxy: {}
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
      - .envs/.production/.minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.entrypoints=http"
      - "traefik.http.routers.django.rule=Host(`eubucco.com`) || Host(`www.eubucco.com`)"
      - "traefik.http.middlewares.django-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.django.middlewares=django-https-redirect"
      - "traefik.http.routers.django-secure.entrypoints=https"
      - "traefik.http.routers.django-secure.rule=Host(`eubucco.com`) || Host(`www.eubucco.com`)"
      - "traefik.http.routers.django-secure.tls=true"
      - "traefik.http.routers.django-secure.tls.certresolver=http"
      - "traefik.http.routers.django-secure.service=django"
      - "traefik.http.services.django.loadbalancer.server.port=5000"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.django-secure.middlewares=secHeaders@file"
      - "com.centurylinklabs.watchtower.enable=true"

  api:
    image: eubucco/eubucco.com:production
    command: /start-api
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    volumes:
      - /home/eubucco-data:/app/data
    networks:
      - proxy
      - default
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
      - .envs/.production/.minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=http"
      - "traefik.http.routers.api.rule=Host(`api.eubucco.com`)"
      - "traefik.http.middlewares.api-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.api.middlewares=api-https-redirect"
      - "traefik.http.routers.api-secure.entrypoints=https"
      - "traefik.http.routers.api-secure.rule=Host(`api.eubucco.com`)"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=http"
      - "traefik.http.routers.api-secure.service=api"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.api-secure.middlewares=secHeaders@file"
      - "com.centurylinklabs.watchtower.enable=true"

  docs:
    image: eubucco/eubucco-docs:latest
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.entrypoints=http"
      - "traefik.http.routers.docs.rule=Host(`docs.eubucco.com`)"
      - "traefik.http.middlewares.docs-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.docs.middlewares=docs-https-redirect"
      - "traefik.http.routers.docs-secure.entrypoints=https"
      - "traefik.http.routers.docs-secure.rule=Host(`docs.eubucco.com`)"
      - "traefik.http.routers.docs-secure.tls=true"
      - "traefik.http.routers.docs-secure.tls.certresolver=http"
      - "traefik.http.routers.docs-secure.service=docs"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.docs-secure.middlewares=secHeaders@file"
      - "com.centurylinklabs.watchtower.enable=true"

  # pg_tileserv:
  #   image: pramsey/pg_tileserv:latest
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped
  #   networks:
  #     - proxy
  #     - default
  #   environment:
  #     DATABASE_URL: $DATABASE_URL
  #     POSTGRES_HOST: $POSTGRES_HOST
  #     POSTGRES_PORT: $POSTGRES_PORT
  #     POSTGRES_DB: $POSTGRES_DB
  #     POSTGRES_USER: $POSTGRES_USER
  #     POSTGRES_PASSWORD: $POSTGRES_PASSWORD
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.pg_tileserv.entrypoints=http"
  #     - "traefik.http.routers.pg_tileserv.rule=Host(`tiles.eubucco.com`)"
  #     - "traefik.http.middlewares.pg_tileserv-https-redirect.redirectscheme.scheme=https"
  #     - "traefik.http.routers.pg_tileserv.middlewares=pg_tileserv-https-redirect"
  #     - "traefik.http.routers.pg_tileserv-secure.entrypoints=https"
  #     - "traefik.http.routers.pg_tileserv-secure.rule=Host(`tiles.eubucco.com`)"
  #     - "traefik.http.routers.pg_tileserv-secure.tls=true"
  #     - "traefik.http.routers.pg_tileserv-secure.tls.certresolver=http"
  #     - "traefik.http.routers.pg_tileserv-secure.service=pg_tileserv"
  #     - "traefik.http.services.pg_tileserv.loadbalancer.server.port=7800"
  #     - "traefik.docker.network=proxy"
  #     - "traefik.http.routers.pg_tileserv-secure.middlewares=secHeaders@file"

  postgres:
    image: eubucco/postgis:latest
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
      - postgres_data_backups:/backups:z
    env_file:
      - .envs/.production/.postgres

  redis:
    image: redis:6
    restart: unless-stopped

  celeryworker-io:
    image: eubucco/eubucco.com:production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
      - .envs/.production/.minio
    volumes:
      - /home/eubucco-data:/app/data
    command: /start-celeryworker-io
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  celeryworker-heavy:
    image: eubucco/eubucco.com:production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
      - .envs/.production/.minio
    volumes:
      - /home/eubucco-data:/app/data
    command: /start-celeryworker-heavy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  celerybeat:
    image: eubucco/eubucco.com:production
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
      - .envs/.production/.minio
    command: /start-celerybeat
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  flower:
    image: eubucco/eubucco.com:production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - proxy
      - default
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
    command: /start-flower
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.entrypoints=http"
      - "traefik.http.routers.flower.rule=Host(`tasks.eubucco.com`)"
      - "traefik.http.middlewares.flower-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.flower.middlewares=flower-https-redirect"
      - "traefik.http.routers.flower-secure.entrypoints=https"
      - "traefik.http.routers.flower-secure.rule=Host(`tasks.eubucco.com`)"
      - "traefik.http.routers.flower-secure.tls=true"
      - "traefik.http.routers.flower-secure.tls.certresolver=http"
      - "traefik.http.routers.flower-secure.service=flower"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.flower-secure.middlewares=secHeaders@file"
      - "com.centurylinklabs.watchtower.enable=true"

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    restart: unless-stopped
    env_file:
      - .envs/.production/.minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - /home/app/eubucco/tiles:/tiles:ro
    networks:
      - default
      - proxy
    ports:
      - "9000:9000"
      - "9001:9001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # ===================================
      # S3 API on s3.eubucco.com
      # ===================================
      - "traefik.http.routers.minio.entrypoints=http"
      - "traefik.http.routers.minio.rule=Host(`s3.eubucco.com`)"
      - "traefik.http.middlewares.minio-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.minio.middlewares=minio-https-redirect"
      - "traefik.http.routers.minio-secure.entrypoints=https"
      - "traefik.http.routers.minio-secure.rule=Host(`s3.eubucco.com`)"
      - "traefik.http.routers.minio-secure.tls=true"
      - "traefik.http.routers.minio-secure.tls.certresolver=http"
      - "traefik.http.routers.minio-secure.middlewares=secHeaders@file"
      - "traefik.http.routers.minio-secure.service=minio"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

      # ===================================
      # Console on minio-console.eubucco.com
      # ===================================
      - "traefik.http.routers.minio-console.entrypoints=http"
      - "traefik.http.routers.minio-console.rule=Host(`minio-console.eubucco.com`)"
      - "traefik.http.middlewares.minio-console-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.minio-console.middlewares=minio-console-https-redirect"

      - "traefik.http.routers.minio-console-secure.entrypoints=https"
      - "traefik.http.routers.minio-console-secure.rule=Host(`minio-console.eubucco.com`)"
      - "traefik.http.routers.minio-console-secure.tls=true"
      - "traefik.http.routers.minio-console-secure.tls.certresolver=http"
      - "traefik.http.routers.minio-console-secure.middlewares=secHeaders@file"
      - "traefik.http.routers.minio-console-secure.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  minio-setup:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    depends_on:
      - minio
      - django
    env_file:
      - .envs/.production/.minio
    entrypoint: |
      /bin/sh -c "
      # 1. Connect to local MinIO
      until (/usr/bin/mc alias set localminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}); do
        echo 'waiting for minio...' && sleep 1;
      done;

      # 2. Configure the Webhook Target (The Plausible Bridge)
      echo 'Configuring Plausible webhook...'
      /usr/bin/mc admin config set localminio notify_webhook:plausible endpoint='http://django-webhook:5000/data/webhook/minio/' enable='on';
      /usr/bin/mc admin config set localminio audit_webhook:plausible endpoint='http://django-webhook:5000/data/webhook/minio/' enable='on';

      # 3. Restart MinIO to register the new SQS ARN
      echo 'Restarting MinIO to apply webhook config...'
      /usr/bin/mc admin service restart localminio;

      # Wait a moment for MinIO to come back online after restart
      sleep 3;

      # 4. Create Bucket and Set Permissions
      /usr/bin/mc mb -p localminio/$${MINIO_BUCKET};
      /usr/bin/mc anonymous set download localminio/$${MINIO_BUCKET};

      # 5. Seed initial data
      if [ -f /tiles/nuts.pmtiles ]; then
        /usr/bin/mc cp /tiles/nuts.pmtiles localminio/$${MINIO_BUCKET}/$${NUTS_PM_TILES_OBJECT};
      fi;

      # 6. Subscribe the Bucket to the Webhook
      echo 'Adding bucket event notification...'
      /usr/bin/mc event add localminio/$${MINIO_BUCKET} arn:minio:sqs::plausible:webhook --event get || true;

      echo 'MinIO setup complete.'
      "
    volumes:
      - /home/eubucco/tiles:/tiles:ro

networks:
  default:
  proxy:
    external: true
